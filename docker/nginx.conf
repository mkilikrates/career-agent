# Career Agent — static-only SPA serving for the unprivileged nginx image.
#
# Requirement 52:
#   * Listens on the non-privileged port 8080 (the unprivileged image runs as a
#     non-root user, UID 101).
#   * Serves the static bundle from the nginx html root.
#   * try_files returns index.html for client-side routes (SPA fallback).
#   * Serves static files ONLY — no proxy_pass, no fastcgi_pass, no upstream,
#     i.e. it never app-processes a request.
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: any unmatched path returns the entry document so the
    # client-side router can handle it. Static files only — no server-side
    # application processing of any kind.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
