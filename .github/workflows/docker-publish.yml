name: Build and publish Docker image

# Publishes the static-bundle container to GitHub Container Registry (ghcr.io).
#   - push to main        -> rolling `latest` + `main` + `sha-<commit>` tags
#   - push tag vX.Y.Z     -> pinned `X.Y.Z`, `X.Y`, `X` semver tags
# Tests must pass before anything is published.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build & push image
    needs: test
    runs-on: ubuntu-latest
    # Only publish for pushes to main or version tags — never for pull requests.
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only on version tags (vX.Y.Z) — not on plain main pushes.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Resolve version (strip leading "v")
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ### 🐳 Container image

            ```bash
            docker run -p 8080:8080 ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}
            ```

            Also available as `ghcr.io/${{ github.repository }}:${{ steps.ver.outputs.version }}` (and the matching `X.Y` / `X` tags). See the [Run Modes & deployment docs](https://github.com/${{ github.repository }}/blob/main/docs/en/developer/run-modes-and-deployment.md).
